version: '3.8'

services:
  web:
    build: .
    env_file: .env
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
      - db_data:/app
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      - web
    restart: always

volumes:
  static_files:
  media_files:
  db_data:
