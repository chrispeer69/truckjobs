server {
    listen 80;
    server_name drivingjobs.online www.drivingjobs.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name drivingjobs.online www.drivingjobs.online;

    ssl_certificate /etc/letsencrypt/live/drivingjobs.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drivingjobs.online/privkey.pem;

    client_max_body_size 100M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

