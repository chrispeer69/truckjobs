{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<section class="section" style="padding-top:80px; padding-bottom:80px;">
    <div class="container" style="max-width:400px;">
        <div class="card p-32">
            <h2 class="mb-8" style="text-align:center;">Forgot Password</h2>
            <p class="text-muted text-center mb-24">Enter your email address and we'll send you a 6-digit verification
                code to reset your password.</p>

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" required placeholder="name@example.com">
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-16">Send Verification Code</button>

                <div class="text-center">
                    <a href="{% url 'core:login' %}" style="text-decoration:none;">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
