{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}

{% block content %}
<section class="section" style="padding-top:80px; padding-bottom:80px;">
    <div class="container" style="max-width:400px;">
        <div class="card p-32">
            <h2 class="mb-8" style="text-align:center;">Set New Password</h2>
            <p class="text-muted text-center mb-24">Choose a strong new password for your account.</p>

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="password" class="form-input" required minlength="8"
                        placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-input" required minlength="8"
                        placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary w-100">Update Password</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
