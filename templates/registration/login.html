{% extends 'base.html' %}
{% block title %}Sign In{% endblock %}

{% block content %}
<section class="section">
    <div class="container-xs">
        <div class="text-center mb-32">
            <span class="eyebrow">Welcome Back</span>
            <h2>Sign in to your account</h2>
        </div>
        <div class="card">
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="username">Username or Email</label>
                    <input type="text" id="username" name="username" class="form-input" required autofocus>
                </div>
                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label class="form-label" for="password">Password</label>
                        <a href="{% url 'core:forgot_password' %}" tabindex="-1" class="text-xs text-muted"
                            style="text-decoration:none;">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
            </form>
            <div class="text-center mt-24">
                <p class="text-muted text-sm">Don't have an account?</p>
                <div style="display:flex;gap:12px;justify-content:center;margin-top:12px;">
                    <a href="{% url 'core:register_driver' %}" class="btn btn-ghost btn-sm">Join as Driver</a>
                    <a href="{% url 'core:register_company' %}" class="btn btn-ghost btn-sm">Join as Dispatcher</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
